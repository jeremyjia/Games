async function ghFetchWithRetry(path, opts = {}, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch('https://api.github.com' + path, {
        ...opts,
        headers: {
          'Authorization': 'Bearer ' + CONFIG.GITHUB_TOKEN,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
          ...(opts.headers || {})
        }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(`GitHub ${res.status}: ${err.message || ''}`);
      }
      return res.json();
    } catch (e) {
      if (i === retries - 1) throw e;
      await new Promise(r => setTimeout(r, 1000 * (i + 1)));
    }
  }
}

function encodeComment(name, lat, lng, addr, preciseAddr, accuracy) {
  const data = { 
    name, lat, lng, 
    addr: addr || '', 
    preciseAddr: preciseAddr || '',
    accuracy: accuracy || 0,
    time: new Date().toISOString() 
  };
  return `<!-- loshare:${JSON.stringify(data)} -->\n**${name}** 📍 ${new Date().toLocaleString('zh-CN')}${addr ? '  \n📍 ' + addr : ''}${preciseAddr ? '  \n🏷️ ' + preciseAddr : ''}${accuracy ? '  \n📡 精度 ±' + accuracy + 'm' : ''}`;
}

function decodeComment(body) {
  const m = body && body.match(/<!-- loshare:({.*?}) -->/);
  if (!m) return null;
  try { return JSON.parse(m[1]); } catch { return null; }
}

/* ── 逆地理编码（高德地图） ── */
const AMAP_KEY = '11f945b4a4be1e72cef07f2e9c1c311d';

async function reverseGeocode(lat, lng) {
  try {
    const r = await fetch(
      `https://restapi.amap.com/v3/geocode/regeo?key=${AMAP_KEY}` +
      `&location=${lng.toFixed(6)},${lat.toFixed(6)}&extensions=all&output=json`
    );
    const d = await r.json();
    if (d.status === '1' && d.regeocode) {
      const c = d.regeocode.addressComponent || {};
      
      let addrParts = [];
      if (c.province && c.province !== c.city) addrParts.push(c.province);
      if (c.city && c.city !== c.province) addrParts.push(c.city);
      if (c.district && !c.district.includes(c.city)) addrParts.push(c.district);
      
      let streetInfo = '';
      if (c.township) streetInfo += c.township;
      if (c.street) streetInfo += c.street;
      
      let poiName = '';
      if (d.regeocode.pois && d.regeocode.pois.length > 0) {
        const sortedPois = d.regeocode.pois.sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));
        for (const poi of sortedPois) {
          if (!poi.name.includes('路') && !poi.name.includes('路口') && !poi.name.includes('交叉口')) {
            poiName = poi.name;
            break;
          }
        }
        if (!poiName && sortedPois.length > 0) {
          poiName = sortedPois[0].name;
        }
      }
      
      let fullAddr = '';
      if (poiName) {
        fullAddr = addrParts.join('') + poiName;
      } else if (streetInfo) {
        fullAddr = addrParts.join('') + streetInfo;
      } else {
        fullAddr = d.regeocode.formatted_address || addrParts.join('');
      }
      
      let preciseAddr = poiName || streetInfo || addrParts.slice(-2).join('');
      
      return { full: fullAddr, precise: preciseAddr };
    }
    return { full: '', precise: '' };
  } catch (e) {
    console.error('逆地理编码失败:', e);
    return { full: '', precise: '' };
  }
}

/* ── ★★★ 高精度WGS-84 → GCJ-02 转换（优化版） ★★★ ── */
function wgs84ToGcj02(wgsLng, wgsLat) {
  const a = 6378245.0;
  const ee = 0.00669342162296594323;
  
  // 检查是否在中国境外
  if (wgsLng < 72.004 || wgsLng > 137.8347 || wgsLat < 0.8293 || wgsLat > 55.8271) {
    return [wgsLng, wgsLat];
  }
  
  function transformLat(x, y) {
    let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
    ret += (20.0 * Math.sin(6.0 * x * Math.PI) + 20.0 * Math.sin(2.0 * x * Math.PI)) * 2.0 / 3.0;
    ret += (20.0 * Math.sin(y * Math.PI) + 40.0 * Math.sin(y / 3.0 * Math.PI)) * 2.0 / 3.0;
    ret += (160.0 * Math.sin(y / 12.0 * Math.PI) + 320.0 * Math.sin(y * Math.PI / 30.0)) * 2.0 / 3.0;
    return ret;
  }
  
  function transformLng(x, y) {
    let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
    ret += (20.0 * Math.sin(6.0 * x * Math.PI) + 20.0 * Math.sin(2.0 * x * Math.PI)) * 2.0 / 3.0;
    ret += (20.0 * Math.sin(x * Math.PI) + 40.0 * Math.sin(x / 3.0 * Math.PI)) * 2.0 / 3.0;
    ret += (150.0 * Math.sin(x / 12.0 * Math.PI) + 300.0 * Math.sin(x / 30.0 * Math.PI)) * 2.0 / 3.0;
    return ret;
  }
  
  const dLat = transformLat(wgsLng - 105.0, wgsLat - 35.0);
  const dLng = transformLng(wgsLng - 105.0, wgsLat - 35.0);
  const radLat = wgsLat / 180.0 * Math.PI;
  let magic = Math.sin(radLat);
  magic = 1 - ee * magic * magic;
  const sqrtMagic = Math.sqrt(magic);
  const dLatFinal = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * Math.PI);
  const dLngFinal = (dLng * 180.0) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
  
  const gcjLat = wgsLat + dLatFinal;
  const gcjLng = wgsLng + dLngFinal;
  
  return [gcjLng, gcjLat];
}

let lastUploadedPos = null;
const MOVE_THRESHOLD_M = 15;

function distanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ── ★★★ 核心：原生GPS高精度定位 + 精确坐标转换 ★★★ ── */
function getHighPrecisionPosition() {
  return new Promise((resolve, reject) => {
    let bestPos = null;
    let bestAccuracy = Infinity;
    let watchId = null;
    let timerId = null;
    let resolved = false;
    let samples = [];

    function cleanup() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      if (timerId !== null) {
        clearTimeout(timerId);
        timerId = null;
      }
    }

    function finish(position, isFinal = false) {
      if (resolved) return;
      
      const accuracy = position.coords.accuracy || Infinity;
      samples.push({ lat: position.coords.latitude, lng: position.coords.longitude, accuracy });
      
      // 取精度最高的样本
      if (accuracy < bestAccuracy) {
        bestPos = position;
        bestAccuracy = accuracy;
        document.getElementById('accuracy-badge').textContent = `📡 精度 ±${Math.round(accuracy)}m`;
      }
      
      // 如果精度足够好（20米以内），或者已经采集了足够样本
      if (accuracy <= 20 || samples.length >= 5) {
        resolved = true;
        cleanup();
        // 使用精度最高的位置
        resolve(bestPos || position);
      }
    }

    // 超时
    timerId = setTimeout(() => {
      if (resolved) return;
      resolved = true;
      cleanup();
      if (bestPos) {
        resolve(bestPos);
      } else {
        reject(new Error('定位超时'));
      }
    }, 25000);

    // 持续监听
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const acc = pos.coords.accuracy || Infinity;
        console.log(`📍 GPS更新: 精度 ${Math.round(acc)}m, 样本 ${samples.length + 1}`);
        finish(pos, false);
      },
      (err) => {
        console.warn('GPS错误:', err.message);
        if (bestPos) {
          resolved = true;
          cleanup();
          resolve(bestPos);
        } else {
          cleanup();
          reject(err);
        }
      },
      {
        enableHighAccuracy: true,
        timeout: 5000,
        maximumAge: 0
      }
    );

    // 快速获取初始位置
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const acc = pos.coords.accuracy || Infinity;
        if (acc < bestAccuracy) {
          bestPos = pos;
          bestAccuracy = acc;
        }
        if (acc <= 20) {
          resolved = true;
          cleanup();
          resolve(pos);
        }
      },
      () => {},
      { enableHighAccuracy: true, timeout: 3000, maximumAge: 0 }
    );
  });
}

/* ── 上传位置 ── */
async function uploadLocation(silent = false) {
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); alert('请先输入你的名字'); return; }

  const btn = document.getElementById('upload-btn');
  if (!silent) { btn.disabled = true; }

  setStatus('loading', silent ? '更新位置…' : '获取高精度GPS…');
  if (!silent) btn.textContent = '📡 获取高精度GPS…';

  try {
    // 1. 使用原生GPS获取高精度WGS-84坐标
    const pos = await getHighPrecisionPosition();
    const { latitude: wgsLat, longitude: wgsLng, accuracy } = pos.coords;
    
    console.log(`📍 WGS-84: ${wgsLat}, ${wgsLng}, 精度 ${Math.round(accuracy)}m`);
    
    // 2. 转换为GCJ-02（高德地图坐标系）
    const [gcjLng, gcjLat] = wgs84ToGcj02(wgsLng, wgsLat);
    console.log(`📍 GCJ-02: ${gcjLat}, ${gcjLng}`);
    
    // 3. 计算转换偏移量（用于显示）
    const offsetLat = gcjLat - wgsLat;
    const offsetLng = gcjLng - wgsLng;
    console.log(`📍 转换偏移: ${(offsetLat * 111000).toFixed(0)}m, ${(offsetLng * 111000 * Math.cos(wgsLat * Math.PI / 180)).toFixed(0)}m`);

    // 检查是否移动
    if (lastUploadedPos) {
      const dist = distanceMeters(lastUploadedPos.lat, lastUploadedPos.lng, gcjLat, gcjLng);
      console.log(`距上次位置: ${dist.toFixed(0)}m`);
      if (dist < MOVE_THRESHOLD_M) {
        setStatus('ok', `未移动 (${dist.toFixed(0)}m)`);
        if (!silent) {
          btn.textContent = '📍 位置未变化';
          setTimeout(() => { btn.textContent = '📤 分享我的当前位置'; btn.disabled = false; }, 1500);
        }
        await loadMembers();
        return;
      }
    }

    if (!silent) btn.textContent = '🔍 解析地址…';
    setStatus('loading', '获取地址…');
    
    // 4. 用GCJ-02坐标获取地址
    const addrInfo = await reverseGeocode(gcjLat, gcjLng);
    const fullAddr = addrInfo.full || '';
    const preciseAddr = addrInfo.precise || '';

    if (!silent) { btn.textContent = '📤 上传到 GitHub…'; }
    setStatus('loading', '写入 Issue…');

    const comments = await ghFetchWithRetry(
      `/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/issues/${CONFIG.ISSUE_NUMBER}/comments`
    );
    const existing = comments.find(c => {
      const d = decodeComment(c.body);
      return d && d.name === name;
    });

    const body = encodeComment(name, gcjLat, gcjLng, fullAddr, preciseAddr, Math.round(accuracy));

    if (existing) {
      await ghFetchWithRetry(
        `/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/issues/comments/${existing.id}`,
        { method: 'PATCH', body: JSON.stringify({ body }) }
      );
    } else {
      await ghFetchWithRetry(
        `/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/issues/${CONFIG.ISSUE_NUMBER}/comments`,
        { method: 'POST', body: JSON.stringify({ body }) }
      );
    }

    lastUploadedPos = { lat: gcjLat, lng: gcjLng, accuracy };
    setStatus('ok', `已更新 (±${Math.round(accuracy)}m)`);
    
    membersCache = null;
    cacheTime = 0;
    await loadMembers();

    if (!silent) {
      if (markerMap[name]) {
        map.flyTo([gcjLat, gcjLng], 17, { duration: 1.5 });
        markerMap[name].openPopup();
      }
      btn.textContent = '✅ 位置已更新！';
      setTimeout(() => {
        btn.textContent = '📤 分享我的当前位置';
        btn.disabled = false;
      }, 2000);
    }

  } catch(e) {
    setStatus('err', '定位失败');
    if (!silent) {
      btn.textContent = '❌ 失败，点击重试';
      btn.disabled = false;
      alert('定位失败：' + e.message + '\n\n💡 提示：请在空旷处尝试，并确保已开启GPS/WiFi。');
    }
    console.error(e);
  }
}

/* ── 地图标记 ── */
function makeCustomIcon(name, color, label = '', accuracy = 0) {
  const ch = [...name][0].toUpperCase();
  const labelHtml = label ? `<div class="marker-label">${label}</div>` : '';
  
  return L.divIcon({
    html: `
      <div class="custom-marker">
        ${labelHtml}
        <div style="width:42px;height:42px;border-radius:50%;background:${color};
             display:flex;align-items:center;justify-content:center;
             color:#fff;font-size:16px;font-weight:700;
             border:3px solid #fff;box-shadow:0 2px 12px rgba(0,0,0,0.4);
             transition:transform 0.2s;">
          ${ch}
        </div>
      </div>
    `,
    className: '',
    iconSize: [42, 42],
    iconAnchor: [21, 21],
    popupAnchor: [0, -30]
  });
}

/* ── 渲染成员 ── */
function renderMembers(members) {
  const oldNames = new Set(Object.keys(markerMap));
  
  for (const m of members) {
    const color = getColor(m.name);
    const latlng = [m.lat, m.lng];
    const label = m.preciseAddr || m.addr || '';
    const shortLabel = label.length > 8 ? label.substring(0, 8) + '…' : label;
    const accuracy = m.accuracy || 0;
    
    const popup = buildPopup(m);
    
    if (markerMap[m.name]) {
      markerMap[m.name].setLatLng(latlng)
        .setIcon(makeCustomIcon(m.name, color, shortLabel, accuracy));
      markerMap[m.name].getPopup().setContent(popup);
    } else {
      markerMap[m.name] = L.marker(latlng, { 
        icon: makeCustomIcon(m.name, color, shortLabel, accuracy),
        title: m.name
      })
        .addTo(map)
        .bindPopup(popup);
    }
    oldNames.delete(m.name);
  }
  
  for (const gone of oldNames) {
    map.removeLayer(markerMap[gone]);
    delete markerMap[gone];
  }

  if (members.length === 1) {
    map.setView([members[0].lat, members[0].lng], 16);
  } else if (members.length > 1) {
    map.fitBounds(L.latLngBounds(members.map(m => [m.lat, m.lng])), { padding: [50, 50] });
  }

  const list = document.getElementById('members-list');
  if (members.length === 0) {
    list.innerHTML = '<div class="empty-tip">还没有人分享位置 👀</div>';
  } else {
    list.innerHTML = members.map(m => {
      const color = getColor(m.name);
      const ch = [...m.name][0].toUpperCase();
      const displayAddr = m.preciseAddr || m.addr || '';
      const accuracy = m.accuracy || 0;
      
      return `
      <div class="member-item" onclick="flyToMember('${m.name}',${m.lat},${m.lng})">
        <div class="avatar" style="background:${color}">${ch}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;">
            <span class="member-name">${escHtml(m.name)}</span>
            <span class="member-time">${timeAgo(m.time)}</span>
            ${accuracy ? `<span class="member-accuracy">±${Math.round(accuracy)}m</span>` : ''}
          </div>
          ${displayAddr ? `<div class="member-addr">📍 ${escHtml(displayAddr)}</div>` : ''}
        </div>
        <button class="locate-btn" onclick="event.stopPropagation();flyToMember('${m.name}',${m.lat},${m.lng})">定位</button>
      </div>`;
    }).join('');
  }

  document.getElementById('last-refresh-time').textContent =
    '更新于 ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function flyToMember(name, lat, lng) {
  map.flyTo([lat, lng], 18, { duration: 1.2 });
  if (markerMap[name]) markerMap[name].openPopup();
}

function buildPopup(m) {
  const addr = m.preciseAddr || m.addr || '';
  const accuracy = m.accuracy || 0;
  return `
    <div style="font-size:13px;line-height:1.8;min-width:160px;">
      <div style="font-size:16px;font-weight:700;color:#1f2937;">${escHtml(m.name)}</div>
      ${addr ? `<div style="color:#374151;margin:4px 0;">📍 ${escHtml(addr)}</div>` : ''}
      ${accuracy ? `<div style="color:#6b7280;font-size:11px;">📡 定位精度 ±${Math.round(accuracy)}m</div>` : ''}
      <div style="color:#9ca3af;font-size:11px;margin-top:4px;border-top:1px solid #f3f4f6;padding-top:4px;">
        ${new Date(m.time).toLocaleString('zh-CN')}
      </div>
    </div>
  `;
}

async function loadMembers(forceRefresh = false) {
  const now = Date.now();
  
  if (!forceRefresh && membersCache && (now - cacheTime) < CACHE_TTL) {
    renderMembers(membersCache);
    return;
  }
  
  showSkeleton();
  setStatus('loading', '读取中…');
  
  try {
    const all = [];
    let page = 1;
    while (true) {
      const batch = await ghFetchWithRetry(
        `/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/issues/${CONFIG.ISSUE_NUMBER}/comments?per_page=100&page=${page}`
      );
      all.push(...batch);
      if (batch.length < 100) break;
      page++;
    }

    const latest = {};
    for (const c of all) {
      const d = decodeComment(c.body);
      if (!d) continue;
      if (!latest[d.name] || new Date(d.time) > new Date(latest[d.name].time)) {
        latest[d.name] = d;
      }
    }
    const members = Object.values(latest).sort((a, b) => new Date(b.time) - new Date(a.time));
    
    membersCache = members;
    cacheTime = now;
    
    renderMembers(members);
    setStatus('ok', members.length + ' 人');
    
  } catch(e) {
    setStatus('err', '读取失败');
    console.error(e);
    
    if (membersCache) {
      renderMembers(membersCache);
      document.getElementById('last-refresh-time').textContent = 
        '⚠️ 使用缓存 ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    } else {
      document.getElementById('members-list').innerHTML = 
        '<div class="empty-tip">⚠️ 加载失败，请点击刷新重试</div>';
    }
  }
}

function timeAgo(iso) {
  const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (sec < 60)   return '刚刚';
  if (sec < 3600) return Math.floor(sec / 60) + ' 分钟前';
  if (sec < 86400) return Math.floor(sec / 3600) + ' 小时前';
  return Math.floor(sec / 86400) + ' 天前';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refreshAll() {
  const name = nameInput.value.trim();
  if (name) {
    await uploadLocation(true);
  } else {
    await loadMembers(true);
  }
}

loadMembers();
setInterval(() => loadMembers(), 60000);
</script>
